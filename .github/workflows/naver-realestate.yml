name: Naver Realestate Fetch

on:
  schedule:
    # 매일 20:30 UTC = 05:30 KST (다음날) - 7시 전달까지 90분 여유를 둬서
    # GitHub Pages/CDN 캐시가 확실히 갱신될 시간을 확보한다.
    - cron: "30 20 * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 테스트용

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        run: python naver_realestate_fetch.py

      - name: Commit and push latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json latest-*.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Update latest.json"
          git pull --rebase origin main
          python gen_index.py
          git add index.html hub.html
          git diff --cached --quiet && echo "No index changes" || git commit -m "Update index.html/hub.html"
          git push
