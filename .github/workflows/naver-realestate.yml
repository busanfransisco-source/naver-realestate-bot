name: Naver Realestate to Telegram

on:
  schedule:
    # 매일 22:00 UTC = 07:00 KST (다음날)
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 테스트용

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python naver_realestate_to_telegram.py
