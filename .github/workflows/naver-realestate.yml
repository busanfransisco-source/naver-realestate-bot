name: Naver Realestate Fetch

on:
  schedule:
    # 매일 21:50 UTC = 06:50 KST (다음날) - 7시 전달 준비를 위해 10분 여유
    - cron: "50 21 * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 테스트용

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        run: python naver_realestate_fetch.py

      - name: Commit and push latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git diff --cached --quiet && echo "No changes" || (git commit -m "Update latest.json" && git push)
