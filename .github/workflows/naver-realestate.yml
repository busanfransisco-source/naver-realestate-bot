name: Naver Realestate Fetch

on:
  schedule:
    # 매일 20:55 UTC = 05:55 KST - 6시 30분 이용 기준, 지연(실행 대기+배포+캐시)을 감안해 미리 수집
    # 실시간성이 중요해서, 7시 공유 10분 전인 6시50분에 최대한 가깝게 가져온다.
    - cron: "55 20 * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 테스트용

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        run: python naver_realestate_fetch.py

      - name: Fetch daum short news
        run: python daum_news_fetch.py || echo "shortnews failed"

      - name: Fetch aptinfo
        run: python aptinfo_fetch.py || echo "aptinfo failed"
        env:
          RONE_KEY: ${{ secrets.RONE_KEY }}

      - name: Commit and push latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json latest-*.json realestate.txt realestate-*.txt
          git add shortnews.txt shortnews-*.txt || true
          git add subs.txt subs-*.txt trend.txt trend-*.txt || true
          git diff --cached --quiet && echo "No changes" || git commit -m "Update latest.json"
          git pull --rebase origin main
          python gen_index.py
          git add index.html hub.html
          git diff --cached --quiet && echo "No index changes" || git commit -m "Update index.html/hub.html"
          git push

      - name: Generate briefing.html (원터치 복사 페이지)
        run: |
          python gen_briefing.py
          git add briefing.html
          git diff --cached --quiet && echo "No briefing changes" || git commit -m "Update briefing.html"
          git pull --rebase origin main
          git push
