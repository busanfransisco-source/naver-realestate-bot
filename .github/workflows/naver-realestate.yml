name: Naver Realestate Fetch

on:
  schedule:
    # 매일 21:50 UTC = 06:50 KST (다음날) - 부동산 뉴스는 날씨/운세와 달리
    # 실시간성이 중요해서, 7시 공유 10분 전인 6시50분에 최대한 가깝게 가져온다.
    - cron: "50 21 * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 테스트용

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        run: python naver_realestate_fetch.py

      - name: Commit and push latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json latest-*.json realestate.txt realestate-*.txt
          git diff --cached --quiet && echo "No changes" || git commit -m "Update latest.json"
          git pull --rebase origin main
          python gen_index.py
          git add index.html hub.html
          git diff --cached --quiet && echo "No index changes" || git commit -m "Update index.html/hub.html"
          git push
