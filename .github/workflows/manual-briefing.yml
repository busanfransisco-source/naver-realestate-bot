name: Manual Briefing Refresh

on:
  push:
    paths:
      - "trigger.txt"
  workflow_dispatch: {}
  schedule:
    - cron: "0 19 * * *"
    - cron: "20 19 * * *"
    - cron: "40 19 * * *"
    - cron: "0 20 * * *"
    - cron: "20 20 * * *"
    - cron: "40 20 * * *"
    - cron: "0 21 * * *"
    - cron: "20 21 * * *"
    - cron: "40 21 * * *"
    - cron: "0 22 * * *"

permissions:
  contents: write

concurrency:
  group: manual-briefing
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Skip if already refreshed recently (scheduled retries)
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            LAST_ISO=$(cat last-refresh.txt 2>/dev/null || echo "1970-01-01T00:00:00Z")
            LAST_EPOCH=$(date -d "$LAST_ISO" +%s 2>/dev/null || echo 0)
            NOW_EPOCH=$(date -u +%s)
            DIFF=$((NOW_EPOCH - LAST_EPOCH))
            echo "마지막 새로고침: $LAST_ISO ( ${DIFF}초 전 )"
            if [ "$DIFF" -lt 10800 ]; then
              echo "이미 최근(3시간 이내)에 새로고침되어 이번 예약 실행은 건너뜁니다."
              echo "run=false" >> "$GITHUB_OUTPUT"
            else
              echo "run=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Fetch weather
        if: steps.gate.outputs.run == 'true'
        run: python weather_fetch.py

      - name: Fetch fortune
        if: steps.gate.outputs.run == 'true'
        run: python fortune_fetch.py

      - name: Fetch realestate news
        if: steps.gate.outputs.run == 'true'
        run: python naver_realestate_fetch.py

      - name: Fetch daum short news
        if: steps.gate.outputs.run == 'true'
        run: python daum_news_fetch.py > shortnews-debug.log 2>&1 || true; tail -20 shortnews-debug.log

      - name: Fetch market info
        if: steps.gate.outputs.run == 'true'
        run: python market_fetch.py || echo "market failed"

      - name: Fetch aptinfo
        if: steps.gate.outputs.run == 'true'
        run: python aptinfo_fetch.py || echo "aptinfo failed"
        env:
          RONE_KEY: ${{ secrets.RONE_KEY }}

      - name: Regenerate pages and commit everything
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python gen_index.py
          python gen_briefing.py
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last-refresh.txt
          git add shortnews.txt shortnews-*.txt shortnews-debug.log || true
          git add subs.txt subs-*.txt trend.txt trend-*.txt rone-cache.json || true
          git add fuelfx.txt fuelfx-*.txt metalcoin.txt metalcoin-*.txt books.txt books-*.txt fx-cache.json || true
          git add weather.txt weather-*.txt fortune.txt fortune-*.txt realestate.txt realestate-*.txt latest.json latest-*.json index.html hub.html briefing.html last-refresh.txt
          git commit -m "Manual briefing refresh"
          git pull --rebase origin main
          git push
